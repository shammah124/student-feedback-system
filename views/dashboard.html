<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <span class="navbar-brand" id="welcomeText"> Student Dashboard </span>

        <button class="btn btn-light" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="dashboard-card">
            <h4>Submit Complaint</h4>

            <p>Report academic or welfare issues.</p>

            <a href="/complaint.html" class="btn btn-primary"> Open </a>
          </div>
        </div>

        <div class="col-md-4">
          <div class="dashboard-card">
            <h4>Track Complaint</h4>

            <p>Check complaint response status.</p>

            <a href="/track.html" class="btn btn-success"> Track </a>
          </div>
        </div>
      </div>
    </div>
    <script>
      if (!localStorage.getItem("student")) {
        window.location.href = "/login.html";
      }

      function logout() {
        localStorage.removeItem("student");

        window.location.href = "/";
      }
      const student = JSON.parse(localStorage.getItem("student"));

      if (student) {
        document.getElementById("welcomeText").innerHTML =
          `Welcome, ${student.fullname}`;
      }
    </script>
  </body>
</html>
